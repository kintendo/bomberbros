# Render Blueprint — deploys the Colyseus server (which also serves the
# client and image assets) as a single persistent web service.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
services:
  - type: web
    name: bomberbros
    runtime: node
    plan: free            # free supports WebSockets; it sleeps after ~15m idle
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
