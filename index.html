<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/colyseus.js@^0.16.0/dist/colyseus.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script src="//netdna.bootstrapcdn.com/twitter-bootstrap/2.3.2/js/bootstrap.min.js"></script>
<link href="//netdna.bootstrapcdn.com/twitter-bootstrap/2.3.2/css/bootstrap-combined.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<br>
<div class="container">
	<div class="well span4 offset4">
		<legend><h2 class="form-signin-heading">Bomber Bros.</h2></legend>
		<h4>Join Game</h4>
		<select class="span3" id="games" size="4"></select>
		<button class="btn btn-large btn-info" onClick="join_game()"><i class="icon-share icon-white"></i> Join Game</button>
		<button class="btn btn-large btn-info" onClick="fetch_games()"><i class="icon-refresh icon-white"></i> Refresh List</button>
		<br><br>
		<h4>Create Game</h4>
		<input id="input_create" placeholder="Game Name"></input>
		<br><br>
		<button class="btn btn-large btn-info" onCLick="create_game()"><i class="icon-plus icon-white"></i> Create Game</button>
		<br>
	</div>
	<br></br>
</div>

<div class="modal hide fade" style="width: 700px; margin: -50px 0 0 -350px;">
	<div class="modal-header">
		<span id="stats"></span>
	</div>
	<div class="modal-body" style="max-height:600px; ">
		<canvas id="canvas"></canvas>
	</div>
	<div class="modal-footer">
		<span class="pull-left"><code>arrows</code> to move. <code>space</code> to plant bomb. <code>esc</code> to quit.</span>
		<button class="btn btn-inverse" onClick="start_game()"><i class="icon-play icon-white"></i> Start Game</button>
	</div>
</div>

</body>

<script type="text/javascript">

	const url = "/images/";

	const canvas = $("#canvas")[0];
	canvas.width = 13 * 50;  // x-coord
	canvas.height = 11 * 50; // y-coord
	const ctx = canvas.getContext("2d");

	// load all images
	const images = {};
	function loadImage(name, file) {
		images[name] = new Image();
		images[name].src = url + file;
	}

	loadImage("bomb", "bomb.png");
	loadImage("flame", "flame.gif");
	loadImage("grass", "grass.png");
	loadImage("crate", "crate.png");
	loadImage("cube", "cube.png");
	loadImage("drop_bomb", "drop_bomb.png");
	loadImage("drop_flame", "drop_flame.png");
	// white player
	loadImage("bro_1_down", "bro_down.png");
	loadImage("bro_1_up", "bro_up.png");
	loadImage("bro_1_left", "bro_left.png");
	loadImage("bro_1_right", "bro_right.png");
	// black player
	loadImage("bro_2_down", "bro_blk_down.png");
	loadImage("bro_2_up", "bro_blk_up.png");
	loadImage("bro_2_left", "bro_blk_left.png");
	loadImage("bro_2_right", "bro_blk_right.png");
	// blue player
	loadImage("bro_3_down", "bro_blu_down.png");
	loadImage("bro_3_up", "bro_blu_up.png");
	loadImage("bro_3_left", "bro_blu_left.png");
	loadImage("bro_3_right", "bro_blu_right.png");
	// red player
	loadImage("bro_4_down", "bro_red_down.png");
	loadImage("bro_4_up", "bro_red_up.png");
	loadImage("bro_4_left", "bro_red_left.png");
	loadImage("bro_4_right", "bro_red_right.png");

	// bootstrap label markup for each player's stat line
	const PLAYER_LABELS = [
		"<span class='label'>P1: </span>",
		"<span class='label label-inverse'>P2: </span>",
		"<span class='label label-info'>P3: </span>",
		"<span class='label label-important'>P4: </span>",
	];

	// use wss:// when the page is served over https (e.g. on Render), ws:// locally
	const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
	const client = new Colyseus.Client(`${wsProtocol}//${location.host}`);
	let room = null;

	// render the whole board from a Colyseus state snapshot
	function render(state) {
		// draw the map tiles
		let xpos = 0, ypos = 0;
		state.map.forEach(function(tile) {
			if (tile === "X") {
				ctx.drawImage(images.cube, xpos, ypos, 50, 50);
			} else if (tile === "C") {
				ctx.drawImage(images.crate, xpos, ypos, 50, 50);
			} else {
				ctx.drawImage(images.grass, xpos, ypos, 50, 50);
			}
			if (xpos === 600) {
				xpos = 0; ypos += 50;
			} else {
				xpos += 50;
			}
		});

		// draw bros and their life stats
		$("#stats").html('');
		state.bros.forEach(function(bro, i) {
			$("#stats").append(PLAYER_LABELS[i]);
			if (!bro.active || bro.life <= 0) {
				$("#stats").append(" <i class='icon-remove'></i> ");
				return;
			}
			for (let heart = 1; heart <= bro.life; heart++) {
				$("#stats").append(" <i class='icon-heart'></i> ");
			}
			ctx.drawImage(images[`bro_${bro.playerNum}_${bro.direction}`], bro.x * 50, bro.y * 50, 50, 50);
		});

		// draw drops
		state.drops.forEach(function(drop) {
			if (drop.type === "flame") {
				ctx.drawImage(images.drop_flame, drop.x * 50, drop.y * 50, 50, 50);
			} else if (drop.type === "bomb") {
				ctx.drawImage(images.drop_bomb, drop.x * 50, drop.y * 50, 50, 50);
			}
		});

		// draw bombs
		state.bombs.forEach(function(bomb) {
			ctx.drawImage(images.bomb, bomb.x * 50, bomb.y * 50, 50, 50);
		});

		// draw flames
		state.flames.forEach(function(flame) {
			flame.points.forEach(function(p) {
				ctx.drawImage(images.flame, p.x * 50, p.y * 50, 50, 50);
			});
		});
	}

	// wire up a freshly joined/created room and open the game modal
	function enterRoom(joined) {
		room = joined;
		$('.modal-footer .btn').show();
		room.onStateChange(render);
		room.onMessage("start_game", () => $('.modal-footer .btn').hide());
		room.onError((code, message) => console.error("room error", code, message));
		$(".modal").modal({ backdrop: "static" });
	}

	function create_game() {
		const name = $("#input_create").val();
		$("#input_create").val("");
		client.create("bomber", { name }).then(enterRoom)
			.catch((e) => console.error("create failed", e));
	}

	function join_game() {
		const roomId = $("#games").val();
		if (!roomId) return;
		client.joinById(roomId).then(enterRoom)
			.catch((e) => console.error("join failed", e));
	}

	function fetch_games() {
		client.getAvailableRooms("bomber").then(function(rooms) {
			console.debug(rooms);
			$("#games").html("");
			if (rooms.length === 0) {
				$("#games").append("<option disabled='disabled'>No games. Create one!</option>");
			} else {
				for (const r of rooms) {
					const name = (r.metadata && r.metadata.name) || r.roomId;
					$("#games").append(`<option value="${r.roomId}">${name}</option>`);
				}
			}
		});
	}

	function start_game() {
		if (room) room.send("start");
	}

	// show the lobby list on load
	fetch_games();

	$(document).keyup(function(event) {
		if (!room) return;
		const direction = { 37: "left", 38: "up", 39: "right", 40: "down" }[event.which] || "";
		if (direction) {
			event.preventDefault();
			room.send("move", { direction });
		} else if (event.which === 32) {
			event.preventDefault();
			room.send("plant");
		} else if (event.which === 27) {
			event.preventDefault();
			$(".modal").modal("hide");
			room.leave();
			room = null;
			fetch_games();
		}
	});

</script>
</html>
